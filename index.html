<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McGoat Dokumentációs Központ</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8f9fa; color: #333; text-align: center; padding: 10% 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #1a1a1a; margin-bottom: 15px; font-size: 24px; }
        p { font-size: 16px; line-height: 1.6; color: #555; margin-bottom: 30px; }
        .btn { display: inline-block; background-color: #fac504; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; transition: background-color 0.3s; letter-spacing: 0.5px; text-transform: uppercase; font-size: 14px;}
        .btn:hover { background-color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <h1>McGoat Dokumentációs Központ</h1>
        <p>Ezen a biztonságos szerveren tároljuk a webáruházunkban kapható termékek hivatalos, magyar nyelvű használati útmutatóit és műszaki leírásait.</p>
        <p>A dokumentumokat közvetlenül az adott termék adatlapjáról, a weblapunkon keresztül tudod letölteni.</p>
        <a href="https://mcgoat.hu" class="btn">Vissza a webáruházba</a>
    </div>
</body>
</html>
